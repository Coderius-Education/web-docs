name: AI Docs Review (Claude)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'src/**/*.md'
      - 'src/**/*.mdx'
      - '**/*.md'
      - '**/*.mdx'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-doc-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  grade:
    name: Claude becijfert gewijzigde docs
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check op API-key
        id: keycheck
        run: |
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::warning::ANTHROPIC_API_KEY secret ontbreekt — AI review wordt overgeslagen. Voeg de secret toe in Settings > Secrets and variables > Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.keycheck.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bepaal gewijzigde .md/.mdx bestanden
        if: steps.keycheck.outputs.skip != 'true'
        id: changed
        run: |
          set -euo pipefail
          git diff --name-only --diff-filter=AM "$BASE_SHA" "$HEAD_SHA" -- '*.md' '*.mdx' \
            | grep -Ev '^(node_modules/|build/|\.docusaurus/|static/)' \
            > changed_files.txt || true
          COUNT=$(wc -l < changed_files.txt | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Gewijzigde bestanden:"
          cat changed_files.txt || true

      - name: Geen docs gewijzigd
        if: steps.keycheck.outputs.skip != 'true' && steps.changed.outputs.count == '0'
        run: echo "::notice::Geen .md/.mdx wijzigingen — niets te beoordelen."

      - name: Setup Python
        if: steps.keycheck.outputs.skip != 'true' && steps.changed.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installeer Anthropic SDK
        if: steps.keycheck.outputs.skip != 'true' && steps.changed.outputs.count != '0'
        run: pip install --quiet 'anthropic>=0.40,<1.0'

      - name: Becijfer met Claude
        if: steps.keycheck.outputs.skip != 'true' && steps.changed.outputs.count != '0'
        run: python .github/scripts/ai_doc_review.py changed_files.txt review.md

      - name: Plaats review als PR-comment
        if: steps.keycheck.outputs.skip != 'true' && steps.changed.outputs.count != '0'
        run: |
          set -euo pipefail
          if [ ! -s review.md ]; then
            echo "::warning::Geen review-output van Claude."
            exit 0
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file review.md
